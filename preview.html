<!DOCTYPE html>

  <title>Minimal Dynamic Profile - @Aniketkolte2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-dark.min.css">
  <style>
    body {
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 30px 15px;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 850px;
      width: 100%;
      background-color: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);

    .header-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      margin-bottom: 20px;
      border-bottom: 1px solid #30363d;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #00f5d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      color: #0d1117;
    }
    .user-info h3 {
      margin: 0;
      font-size: 16px;
      color: #f0f6fc;
    }
    .user-info p {
      margin: 2px 0 0 0;
      color: #8b949e;
      font-size: 13px;
    }
